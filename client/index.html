<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Realtime Multiplayer Platform</title>
    <style>
        * {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, sans-serif;
  color: #f8fafc;
  background-image: url("./a_digital_background_background_for_a_multiplayer.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  position: relative;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(3, 7, 18, 0.74);
  backdrop-filter: blur(2px);
  z-index: 0;
}

#app {
  position: relative;
  z-index: 1;
  min-height: 100vh;
}

/* landing */
.landing-screen,
.entry-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.landing-card,
.entry-card {
  width: 100%;
  max-width: 960px;
  background: rgba(15, 23, 42, 0.72);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 24px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
  backdrop-filter: blur(12px);
}

.landing-card {
  padding: 40px 32px;
  text-align: center;
}

.entry-card {
  max-width: 560px;
  padding: 28px;
}

.landing-badge,
.entry-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 32px;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.08em;
  background: rgba(255, 255, 255, 0.08);
  color: #cbd5e1;
}

.host-badge {
  background: rgba(14, 165, 233, 0.16);
  color: #7dd3fc;
}

.controller-badge {
  background: rgba(34, 197, 94, 0.16);
  color: #86efac;
}

.landing-title,
.entry-title {
  margin: 16px 0 10px;
  font-size: clamp(2rem, 4vw, 3.2rem);
  line-height: 1.1;
}

.entry-title {
  font-size: 2rem;
}

.landing-subtitle,
.entry-subtitle {
  margin: 0 auto;
  max-width: 720px;
  color: #cbd5e1;
  line-height: 1.6;
  font-size: 1rem;
}

.mode-grid {
  margin-top: 32px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

.mode-card {
  width: 100%;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: rgba(30, 41, 59, 0.72);
  color: #f8fafc;
  border-radius: 20px;
  padding: 24px;
  text-align: left;
  cursor: pointer;
  transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
}

.mode-card:hover {
  transform: translateY(-4px);
  border-color: rgba(255, 255, 255, 0.18);
  background: rgba(51, 65, 85, 0.84);
}

.mode-card:active {
  transform: translateY(-1px);
}

.mode-icon {
  font-size: 2rem;
  margin-bottom: 16px;
}

.mode-content h2 {
  margin: 0 0 10px;
  font-size: 1.35rem;
}

.mode-content p {
  margin: 0;
  color: #cbd5e1;
  line-height: 1.6;
}

.entry-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.back-btn {
  border: 1px solid rgba(255, 255, 255, 0.12);
  background: rgba(255, 255, 255, 0.06);
  color: #e2e8f0;
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 0.95rem;
  cursor: pointer;
}

.back-btn:hover {
  background: rgba(255, 255, 255, 0.1);
}

.form-group {
  margin-top: 22px;
}

.input-label {
  display: block;
  margin-bottom: 8px;
  color: #cbd5e1;
  font-size: 0.95rem;
  font-weight: 600;
}

.text-input {
  width: 100%;
  height: 48px;
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  background: rgba(15, 23, 42, 0.7);
  color: #f8fafc;
  padding: 0 14px;
  font-size: 1rem;
  outline: none;
}

.text-input::placeholder {
  color: #94a3b8;
}

.text-input:focus {
  border-color: rgba(125, 211, 252, 0.9);
  box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.16);
}

.entry-actions {
  margin-top: 22px;
}

.primary-btn {
  width: 100%;
  height: 50px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(90deg, #2563eb, #7c3aed);
  color: white;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s ease, opacity 0.15s ease;
}

.primary-btn:hover {
  opacity: 0.95;
}

.primary-btn:active {
  transform: scale(0.985);
}

.inline-message {
  display: none;
  margin-top: 16px;
  padding: 12px 14px;
  border-radius: 12px;
  background: rgba(239, 68, 68, 0.14);
  border: 1px solid rgba(239, 68, 68, 0.28);
  color: #fecaca;
  font-size: 0.95rem;
}

@media (max-width: 640px) {
  .landing-card,
  .entry-card {
    padding: 22px 18px;
  }

  .entry-header {
    flex-direction: column;
    align-items: flex-start;
  }

  .landing-title {
    font-size: 2.2rem;
  }

  .entry-title {
    font-size: 1.7rem;
  }
}
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
